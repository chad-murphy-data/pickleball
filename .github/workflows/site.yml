# Build and deploy the static site to GitHub Pages.
#
# Runs on every push to main and nightly. The nightly run refreshes game
# data from the public API (polite, ~1 req/s; per-request responses are
# cached in raw/ via actions/cache, so the first cold run sweeps the full
# 2024– history in an hour or two and later runs only fetch new/recent
# dates), then COMMITS the refreshed data/ CSVs back to the branch — so
# push builds, which skip the network entirely, always build from the
# last refresh instead of regressing to week-old data. The shrink guard
# keeps a failed/partial parse from ever reaching the site or the repo.
# Model values (v2_*.csv) only change when a refit is committed.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
name: site

on:
  push:
    branches: [main]
  schedule:
    - cron: "20 9 * * *"   # nightly, 09:20 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache raw API responses
        id: rawcache
        uses: actions/cache@v4
        with:
          path: raw
          key: raw-${{ github.run_id }}
          restore-keys: raw-

      - name: Refresh data from the public API (nightly + manual only)
        if: github.event_name != 'push'
        continue-on-error: true
        run: |
          pip install httpx
          python scraper/harvest.py --start 2024-01-01
          python scraper/enrich_formats.py
          python scraper/parse.py
          python scraper/parse_singles.py
          python scraper/extract_ratings.py
          python web/make_forecast.py --days 7
          python scraper/tournament_state.py
        timeout-minutes: 210

      - name: Guard against partial data (restore committed CSVs if parse shrank)
        run: |
          lines=$(wc -l < data/games.csv)
          echo "games.csv rows: $lines"
          if [ "$lines" -lt 30000 ]; then
            echo "::warning::games.csv suspiciously small — restoring committed data"
            git checkout -- data/
          fi

      - name: Build site
        run: python web/build_site.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Commit refreshed data (nightly + manual only)
        if: github.event_name != 'push'
        continue-on-error: true
        run: |
          git add -A data/
          if git diff --cached --quiet; then
            echo "data unchanged — nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "data: nightly refresh ($(date -u +%F))"
            git push origin "HEAD:${{ github.ref_name }}" \
              || (git pull --rebase origin "${{ github.ref_name }}" \
                  && git push origin "HEAD:${{ github.ref_name }}")
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
